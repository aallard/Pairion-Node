name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, Lint, Build, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-action-toolchain@v1
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # CONVENTIONS §4 step 1: Format check
      - name: cargo fmt
        run: cargo fmt -- --check

      # CONVENTIONS §4 step 2: Clippy
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- --deny warnings

      # CONVENTIONS §4 step 3: Cross-compile for aarch64
      - name: cargo build (aarch64-unknown-linux-gnu)
        run: cargo build --release --target aarch64-unknown-linux-gnu

      # CONVENTIONS §4 step 4: Host build
      - name: cargo build (host)
        run: cargo build --release

      # CONVENTIONS §4 step 5: Unit tests
      - name: cargo test
        run: cargo test --workspace

      # CONVENTIONS §4 step 6: Integration tests
      - name: cargo test (integration)
        run: cargo test --workspace -- --ignored

      # CONVENTIONS §4 step 9: Single-binary discipline lint
      - name: lint-single-binary-discipline
        run: bash scripts/lint-single-binary-discipline.sh

      # CONVENTIONS §4 step 10: Audio no-disk-writes lint
      - name: lint-audio-no-disk-writes
        run: bash scripts/lint-audio-no-disk-writes.sh

      # CONVENTIONS §4 step 11: Coverage
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin || true

      - name: cargo tarpaulin
        run: cargo tarpaulin --workspace --skip-clean -- --skip ignored
        continue-on-error: true
